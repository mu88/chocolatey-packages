name: Choco Auto Update

on:
  schedule:
    - cron:  '0 0 * * *'
  workflow_dispatch:
    inputs:
      package:
        type: choice
        description: Which package to update? (all = run full matrix)
        default: all
        options:
          - all
          - foldersync-desktop
          - token2-companion
          - github-copilot-cli

defaults:
  run:
    shell: pwsh

jobs:
  get_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Build filtered matrix
        id: set
        run: |
          $all = @(
            @{ package = 'foldersync-desktop'; testable = $false }
            @{ package = 'token2-companion';   testable = $true  }
            @{ package = 'github-copilot-cli'; testable = $true  }
          )
          $inputPackage = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.package }}' } else { 'all' }
          $filtered = if (-not $inputPackage -or $inputPackage -eq 'all') {
            $all
          } else {
            $all | Where-Object { $_.package -eq $inputPackage }
          }
          $matrix = [ordered]@{ include = @($filtered) } | ConvertTo-Json -Compress
          "matrix=$matrix" >> $Env:GITHUB_OUTPUT

  update_choco_auto:
    needs: get_matrix
    name: update_${{ matrix.package }}
    runs-on: windows-latest

    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
      pull-requests: write

    strategy:
      matrix: ${{ fromJson(needs.get_matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10

      - name: Configure GitHub Packages as NuGet source
        run: dotnet nuget add source --username mu88 --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github 'https://nuget.pkg.github.com/mu88/index.json'

      - name: Install Chocolatey Automatic Package Updater Module
        run: Install-Module -Name Chocolatey-AU -Force

      - name: Run ${{ matrix.package }} update script
        id: update
        run: |
          Set-Location _auto\${{ matrix.package }}
          $UpdateOutput = .\update.ps1 -GitHubToken ${{ secrets.GITHUB_TOKEN }}
          $NupkgPath = (($UpdateOutput.Result | Where-Object {$_ -like '*.nupkg''*'}) -split "'")[1]
          $NewVersion = $UpdateOutput.RemoteVersion

          if ($NupkgPath) {
            $UpdateStatus = 'Update Available'
          } elseif ($UpdateOutput.Result -match 'already exists in the Chocolatey community feed') {
            # AU aborts early when the remote version already exists in the Chocolatey community feed,
            # leaving local nuspec/install files unpatched. To bring the repo back in sync we must
            # re-run with a fake gallery URL so AU's feed-existence check throws and is swallowed,
            # allowing AU to apply au_SearchReplace and patch the nuspec/install files.
            # We then commit the patched files but intentionally skip all feed pushes
            # (the version is already published there).
            $env:au_GalleryPackageRootUrl = 'https://localhost'
            $UpdateOutput = .\update.ps1 -GitHubToken ${{ secrets.GITHUB_TOKEN }}
            Remove-Item Env:\au_GalleryPackageRootUrl
            $NupkgPath = (($UpdateOutput.Result | Where-Object {$_ -like '*.nupkg''*'}) -split "'")[1]
            $NewVersion = $UpdateOutput.RemoteVersion
            $UpdateStatus = 'Sync Nuspec'
          } else {
            $UpdateStatus = 'No Update'
          }

          Write-Output "NupkgPath=$($NupkgPath)" >> $Env:GITHUB_OUTPUT
          Write-Output "NewVersion=$($NewVersion)" >> $Env:GITHUB_OUTPUT
          Write-Output "UpdateStatus=$($UpdateStatus)" >> $Env:GITHUB_OUTPUT

      - name: Pack ${{ matrix.package }} for testing (manual trigger only)
        id: pack_for_test
        if: ${{ github.event_name == 'workflow_dispatch' && matrix.testable && steps.update.outputs.UpdateStatus == 'Update Available' && steps.update.outputs.NupkgPath == '' }}
        run: |
          Set-Location _auto\${{ matrix.package }}
          $PackOutput = choco pack
          $NupkgPath = (($PackOutput | Where-Object {$_ -like '*.nupkg''*'}) -split "'")[1]
          Write-Output "NupkgPath=$($NupkgPath)" >> $Env:GITHUB_OUTPUT

      - name: Test ${{ matrix.package }} install
        if: ${{ matrix.testable && (steps.update.outputs.NupkgPath != '' || steps.pack_for_test.conclusion == 'success') }}
        run: |
          $NupkgPath = if ('${{ steps.update.outputs.NupkgPath }}') { '${{ steps.update.outputs.NupkgPath }}' } else { '${{ steps.pack_for_test.outputs.NupkgPath }}' }
          Test-Package -Install -Nu $NupkgPath

      - name: Publish ${{ matrix.package }} to GitHub Packages feed
        if: steps.update.outputs.UpdateStatus == 'Update Available' && github.ref == 'refs/heads/${{ github.event.repository.default_branch }}'
        # Skipped for 'Sync Nuspec' - version already exists in the feed
        # Skipped on non-main branches as a safety net
        run: |
          Set-Location _auto\${{ matrix.package }}
          $Nupkg = '${{ steps.update.outputs.NupkgPath }}'
          $ApiKey = '${{ secrets.GITHUB_TOKEN }}'
          dotnet nuget push $Nupkg --api-key $ApiKey --source 'github' --skip-duplicate
  
      - name: Publish ${{ matrix.package }} to Chocolatey community feed
        if: steps.update.outputs.UpdateStatus == 'Update Available' && github.ref == 'refs/heads/${{ github.event.repository.default_branch }}'
        # Skipped for 'Sync Nuspec' - version already exists in the feed
        # Skipped on non-main branches as a safety net
        run: |
          Set-Location _auto\${{ matrix.package }}
          $Nupkg = '${{ steps.update.outputs.NupkgPath }}'
          $ApiKey = '${{ secrets.CHOCO_KEY }}'
          $ChocoServer = 'https://push.chocolatey.org/'
          $PSNativeCommandUseErrorActionPreference = $false
          $Output = choco push $Nupkg --source $ChocoServer --key $ApiKey 2>&1
          Write-Output $Output
          if ($LASTEXITCODE -ne 0) {
            if (($Output -join ' ') -match 'already exists') {
              Write-Warning 'Package already exists in the Chocolatey feed, skipping.'
            } else {
              throw "choco push failed with exit code $LASTEXITCODE"
            }
          }

      - name: Commit and push changes
        if: steps.update.outputs.UpdateStatus == 'Update Available' || steps.update.outputs.UpdateStatus == 'Sync Nuspec'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $Branch = "chore/update-${{ matrix.package }}-v${{ steps.update.outputs.NewVersion }}"
          git checkout -b $Branch
          git commit -a -m "feat(${{ matrix.package }}): upgrade to v${{ steps.update.outputs.NewVersion }}"
          git push origin $Branch

          gh pr create --title "feat(${{ matrix.package }}): upgrade to v${{ steps.update.outputs.NewVersion }}" --body "" --base main --head $Branch
          gh pr merge --squash --admin --delete-branch
